name: Release Python SDK

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "v2/python/**"
      - ".github/scripts/generate-changelog.sh"
      - ".github/workflows/release-python.yml"
  workflow_dispatch:

jobs:
  release:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run tests
        run: poetry run pytest -vv tests/

      - name: Build package
        run: poetry build

      - name: Generate release notes
        working-directory: .
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh python HEAD > /tmp/release-notes.md
          ./.github/scripts/generate-changelog.sh python HEAD --write

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          TAG_PREFIX="v2/python/v"
          LATEST=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="${TAG_PREFIX}2.0.0"
          else
            NEW_TAG=$(echo "$LATEST" | awk -F. -v OFS=. '{$NF += 1 ; print}')
          fi
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          gh release create "$NEW_TAG" v2/python/dist/* \
            --title "Python SDK ${NEW_TAG#v2/python/}" \
            --notes-file /tmp/release-notes.md

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$POETRY_PYPI_TOKEN_PYPI" ]; then
            poetry publish --no-interaction
          else
            echo "Skipped PyPI publish (PYPI_API_TOKEN not configured)."
          fi
