name: Release Python SDK

# Primary distribution: GitHub Releases on Yoven/AnhurDB-SDK
# https://github.com/Yoven/AnhurDB-SDK/releases
#
# Optional secondary: PyPI when PYPI_API_TOKEN is configured.

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "v2/python/**"
      - ".github/scripts/generate-changelog.sh"
      - ".github/workflows/release-python.yml"
  workflow_dispatch:

jobs:
  release:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute next version
        id: version
        working-directory: .
        run: |
          set -euo pipefail
          TAG_PREFIX="v2/python/v"
          LATEST=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -n1 || true)
          if [ -z "$LATEST" ]; then
            VERSION="2.0.0"
          else
            VERSION=$(echo "${LATEST#${TAG_PREFIX}}" | awk -F. -v OFS=. '{$NF += 1 ; print}')
          fi
          NEW_TAG="${TAG_PREFIX}${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${NEW_TAG}"

      - name: Bump package version
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          grep '^version =' pyproject.toml

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run tests
        run: |
          poetry run pytest -vv tests/ \
            --ignore=tests/test_storage.py \
            --ignore=tests/test_integration.py \
            --ignore=tests/e2e_hardening_live.py

      - name: Build package
        run: poetry build

      - name: Generate release notes
        working-directory: .
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh python HEAD > /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists — skipping release create."
            exit 0
          fi
          gh release create "$NEW_TAG" v2/python/dist/* \
            --title "Python SDK ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
          echo "Published GitHub Release: https://github.com/Yoven/AnhurDB-SDK/releases/tag/${NEW_TAG}"

      - name: Publish to PyPI (optional)
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "${POETRY_PYPI_TOKEN_PYPI:-}" ]; then
            poetry publish --no-interaction
          else
            echo "Skipped PyPI publish (PYPI_API_TOKEN not configured). Wheel is on GitHub Releases."
          fi
