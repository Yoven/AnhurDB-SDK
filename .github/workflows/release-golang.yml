name: Release Go SDK

# Primary distribution: GitHub Releases on Yoven/AnhurDB-SDK
# https://github.com/Yoven/AnhurDB-SDK/releases
#
# Consumers:
#   go get github.com/Yoven/AnhurDB-SDK/v2/golang/v2@v2.x.y
# (tag shape: v2/golang/v2.x.y)

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "v2/golang/**"
      - ".github/scripts/generate-changelog.sh"
      - ".github/workflows/release-golang.yml"
  workflow_dispatch:

jobs:
  release:
    name: Tag Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go mod tidy
      - run: go test -v ./...
      - run: go build -v ./...

      - name: Generate release notes
        working-directory: .
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh golang HEAD > /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          set -euo pipefail
          TAG_PREFIX="v2/golang/v"
          LATEST=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -n1 || true)
          if [ -z "$LATEST" ]; then
            NEW_TAG="${TAG_PREFIX}2.0.0"
          else
            NEW_TAG=$(echo "$LATEST" | awk -F. -v OFS=. '{$NF += 1 ; print}')
          fi
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists — skipping release create."
            exit 0
          fi
          # Source archive is attached automatically by GitHub for the tag.
          gh release create "$NEW_TAG" \
            --title "Go SDK ${NEW_TAG#${TAG_PREFIX}}" \
            --notes-file /tmp/release-notes.md
          echo "Published GitHub Release: https://github.com/Yoven/AnhurDB-SDK/releases/tag/${NEW_TAG}"
          echo "Install: go get github.com/Yoven/AnhurDB-SDK/v2/golang/v2@${NEW_TAG#${TAG_PREFIX}}"
