name: Gate plugins, release Claude plugin

# Both AnhurDB memory plugins (claude + hermes) ship PREBUILT per-platform binaries
# (bin/anhur-<name>-memory-<os>-<arch>, committed) so an install needs no Go toolchain.
# This workflow GATES BOTH on vet/tests + a reproducible-build freshness check, then
# tags and publishes a GitHub Release for the CLAUDE plugin from the version in its
# plugin.json.
#
# Why gate hermes but not release it: both plugins import plugins/core via a `replace`,
# so a core change can break hermes just as easily as claude, and no other workflow ever
# compiles hermes. It is installed straight from the marketplace git repo, so it needs no
# GitHub Release of its own — but its committed binaries must not be allowed to go stale.
#
# Neither publishes to a package registry — a Claude Code plugin is installed from the
# marketplace git repo (.claude-plugin/marketplace.json), unlike the language SDKs
# (npm / PyPI / Go-tag).
#
# SDK coupling / release ORDER: the plugins build against the SDK through the monorepo
# `replace ../../golang`, so a plugin release is reproducible only from a commit where
# the SDK is already at its intended version. Tag the SDK first (Release Go SDK), then
# the plugin.
#
# To cut a release:
#   1. bump "version" in v2/plugins/claude/.claude-plugin/plugin.json
#   2. `cd v2/plugins/claude && make release-binaries` (go matching GO_VERSION below)
#   3. commit the refreshed bin/ + the version bump, merge to main
#   (touching plugins/core? rebuild BOTH plugins' bin/ — the freshness gate checks both)

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "v2/plugins/**"
      # The SDK is linked into both plugins via `replace ../../golang`, so an SDK-only
      # commit changes the binaries the plugins ship. Without this path the freshness
      # gate never runs on that commit and bin/ goes stale silently — which is exactly
      # what happened when the scope-planes work landed under v2/golang.
      - "v2/golang/**"
      - ".github/workflows/release-plugin.yml"
  workflow_dispatch:

concurrency:
  group: release-plugin
  cancel-in-progress: false

env:
  # Pinned to the toolchain the committed binaries are built with, so the
  # reproducible-build freshness gate below is byte-exact. Bump here AND rebuild
  # the committed binaries with the same version in the same PR.
  GO_VERSION: "1.24.4"

jobs:
  release:
    name: Release Claude plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Gate 1 — pure-logic tests for the shared engine and the plugin. test_e2e.sh
      # is intentionally NOT run here: it drives the binary against a LIVE AnhurDB
      # with a real tenant key, which CI does not (and must not) hold.
      # hermes is gated alongside claude on purpose: both import plugins/core through a
      # `replace`, so a core change breaks hermes just as easily — and nothing else in CI
      # ever compiles it. Gating only the plugin we happen to release is how hermes shipped
      # for weeks with no binary at all.
      - name: Vet + unit tests
        run: |
          set -euo pipefail
          (cd v2/plugins/core   && go vet ./... && go test ./...)
          (cd v2/plugins/claude && go vet ./... && go test ./...)
          (cd v2/plugins/hermes && go vet ./... && go test ./...)

      # Gate 2 — the committed binaries must equal a fresh build. -trimpath makes
      # the build reproducible, so any drift means someone changed the code without
      # running `make release-binaries`. Fail loud rather than ship a stale binary.
      # Both plugins ship prebuilt binaries, so both are checked.
      - name: Committed binaries are fresh
        run: |
          set -euo pipefail
          for plugin in claude hermes; do
            (
              cd "v2/plugins/$plugin"
              make release-binaries
            )
            if ! git diff --quiet -- "v2/plugins/$plugin/bin/"; then
              echo "::error::Committed v2/plugins/$plugin/bin/ is stale — run 'make release-binaries' (go ${GO_VERSION}) in v2/plugins/$plugin and commit."
              git --no-pager diff --stat -- "v2/plugins/$plugin/bin/"
              exit 1
            fi
          done

      # Tag = plugins/claude/v<version-from-plugin.json>. plugin.json's version is the
      # single source of truth you bump by hand; an existing tag means you forgot to.
      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(jq -r .version v2/plugins/claude/.claude-plugin/plugin.json)"
          tag="plugins/claude/v${version}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — bump 'version' in plugin.json to release a new build."
            exit 0
          fi
          prev="$(git tag -l 'plugins/claude/v*' | sort -V | tail -n1 || true)"
          {
            echo "## anhurdb-memory ${version}"
            echo
            echo "Install: add the \`anhur\` marketplace, then install \`anhurdb-memory\`."
            echo
            echo "### Changes"
            if [ -n "$prev" ]; then
              git log --pretty='- %s' "${prev}..HEAD" -- v2/plugins v2/golang
            else
              git log --pretty='- %s' -n 20 -- v2/plugins
            fi
          } > /tmp/plugin-notes.md
          git tag "${tag}"
          git push origin "${tag}"
          gh release create "${tag}" \
            --title "anhurdb-memory ${version}" \
            --notes-file /tmp/plugin-notes.md \
            v2/plugins/claude/bin/anhur-claude-memory-darwin-amd64 \
            v2/plugins/claude/bin/anhur-claude-memory-darwin-arm64 \
            v2/plugins/claude/bin/anhur-claude-memory-linux-amd64 \
            v2/plugins/claude/bin/anhur-claude-memory-linux-arm64
