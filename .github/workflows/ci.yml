name: AnhurDB-SDK CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # Golang SDK v2 Pipeline (Split Jobs)
  # ==========================================
  build-go:
    name: Build Golang SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Ensure Dependencies
      run: |
        echo "=> Verifying Go Modules..."
        go mod tidy
    - name: Build Go AST/Query Package
      run: |
        echo "=> Verifying Golang Build (Verbose)..."
        go build -v -x ./...

  test-go:
    name: Test Golang SDK
    needs: build-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Run Go Tests
      run: |
        echo "=> Executing Golang Test Suite (Verbose)..."
        go test -v ./... -coverprofile=coverage.out

  # ==========================================
  # Python SDK v2 Pipeline (Split Jobs)
  # ==========================================
  lint-python:
    name: Static Mypy Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install -v
    - name: Static Type Checking
      run: |
        echo "=> Running MyPy (Verbose)..."
        poetry run mypy --show-error-context --show-column-numbers anhurdb/

  test-python:
    name: Test Python SDK
    needs: lint-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install -v
    - name: Run Python Pytest
      run: |
        echo "=> Executing Python Test Suite (Verbose)..."
        poetry run pytest -vv tests/

  # ==========================================
  # Release Automation (Publish to PyPI / Tag Go)
  # ==========================================
  publish:
    name: Publish Release
    needs: [build-go, test-go, lint-python, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Log Success
        run: |
          echo "=> 🚀 CI Pipeline verified successfully in parallel."
          echo "=> Future step: Add Twine/Poetry publish for PyPI here."
          echo "=> Future step: Add Git Tag generation for Go pkg.go.dev here."
