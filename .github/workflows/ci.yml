name: SDK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Test Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go mod tidy
      - run: go build -v ./...
      - run: go test -v ./... -coverprofile=coverage.out

  lint-python:
    name: Lint Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install -v
      - run: poetry run mypy anhurdb/

  test-python:
    name: Test Python SDK
    needs: lint-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install -v
      - run: poetry run pytest -vv tests/

  build-ts:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build

  test-ts:
    name: Test TypeScript SDK
    needs: build-ts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
