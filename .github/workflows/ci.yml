name: AnhurDB-SDK CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # Golang SDK v2 Pipeline (Split Jobs)
  # ==========================================
  build-go:
    name: Build Golang SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Ensure Dependencies
      run: |
        echo "=> Verifying Go Modules..."
        go mod tidy
    - name: Build Go AST/Query Package
      run: |
        echo "=> Verifying Golang Build (Verbose)..."
        go build -v -x ./...

  test-go:
    name: Test Golang SDK
    needs: build-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Run Go Tests
      run: |
        echo "=> Executing Golang Test Suite (Verbose)..."
        go test -v ./... -coverprofile=coverage.out

  # ==========================================
  # Python SDK v2 Pipeline (Split Jobs)
  # ==========================================
  lint-python:
    name: Static Mypy Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install -v
    - name: Static Type Checking
      run: |
        echo "=> Running MyPy (Verbose)..."
        poetry run mypy --show-error-context --show-column-numbers anhurdb/

  test-python:
    name: Test Python SDK
    needs: lint-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install -v
    - name: Run Python Pytest
      run: |
        echo "=> Executing Python Test Suite (Verbose)..."
        poetry run pytest -vv tests/

  # ==========================================
  # Release Automation (Publish to PyPI / Tag Go)
  # ==========================================
  publish-python:
    name: Publish Python SDK to PyPI
    needs: [build-go, test-go, lint-python, test-python]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auto-Release Python
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=> Calculating next Python SDK semantic version..."
          LATEST=$(git ls-remote --tags origin | grep -o 'refs/tags/v2/python/v[0-9]*\.[0-9]*\.[0-9]*' | sed 's/refs\/tags\///' | sort -V | tail -n1 || echo "v2/python/v2.0.0")
          if [ -z "$LATEST" ]; then LATEST="v2/python/v2.0.0"; fi
          NEW_TAG=$(echo $LATEST | awk -F. -v OFS=. '{$NF += 1 ; print}')
          echo "=> Prev: $LATEST | Next: $NEW_TAG"
          gh release create "$NEW_TAG" --title "Python SDK ${NEW_TAG#v2/python/}" --generate-notes
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Build and Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "=> Building Python Package..."
          poetry build
          echo "=> Skipped actual publish since PYPI_API_TOKEN is not strictly configured yet."
          
  publish-go:
    name: Prepare Golang SDK Tag
    needs: [build-go, test-go, lint-python, test-python]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Auto-Release Golang
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=> Calculating next Golang SDK semantic version..."
          LATEST=$(git ls-remote --tags origin | grep -o 'refs/tags/v2/golang/v[0-9]*\.[0-9]*\.[0-9]*' | sed 's/refs\/tags\///' | sort -V | tail -n1 || echo "v2/golang/v2.0.0")
          if [ -z "$LATEST" ]; then LATEST="v2/golang/v2.0.0"; fi
          NEW_TAG=$(echo $LATEST | awk -F. -v OFS=. '{$NF += 1 ; print}')
          echo "=> Prev: $LATEST | Next: $NEW_TAG"
          gh release create "$NEW_TAG" --title "Golang SDK ${NEW_TAG#v2/golang/}" --generate-notes
      - name: Verify module
        run: |
          echo "=> Go modules are intrinsically published via Git Tags."
          echo "=> Tag has been successfully generated above."
          go mod tidy
          go build ./...
