name: AnhurDB-SDK Release

on:
  push:
    tags:
      - 'v*' # Trigger build and publish on tag push

jobs:
  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/python
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build and Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "=> Building Python Package..."
          poetry build
          echo "=> Publishing to PyPI..."
          # poetry publish
          echo "=> Skipped actual publish since PYPI_API_TOKEN is not strictly configured yet."
          
  publish-go:
    name: Prepare Golang SDK Tag
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/golang
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Verify module
        run: |
          echo "=> Go modules are intrinsically published via Git Tags."
          echo "=> Validating syntax for module github.com/yoven/anhurdb-sdk/v2/golang@${{ github.ref_name }}"
          go mod tidy
          go build ./...
